<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Volunteer Outfit Selector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="input_video" autoplay muted playsinline></video>
  <canvas id="output_canvas"></canvas>

  <!-- Correct script sources -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

  <script src="main.js"></script>

  <!-- Scale control slider -->
  <div id="scale-control" style="
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 12px 20px;
    z-index: 10000;
    font-family: system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 300px;
    pointer-events: auto;
  ">
    <div style="display: flex; justify-content: space-between; color: white;">
      <span style="font-size: 14px; font-weight: 500;">👕 Jacket Size</span>
      <span id="scale-value" style="font-size: 14px; font-weight: bold; background: #007bff; padding: 2px 8px; border-radius: 12px;">1.0x</span>
    </div>
    <input type="range" id="jacket-scale-slider" min="0.5" max="2.0" step="0.01" value="1.0" style="
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      background: linear-gradient(90deg, #007bff, #00ff88);
      border-radius: 2px;
      outline: none;
    ">
    <div style="display: flex; justify-content: space-between; color: rgba(255,255,255,0.7); font-size: 11px;">
      <span>Smaller</span>
      <span>Reset</span>
      <span>Larger</span>
    </div>
    <button id="reset-scale" style="
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      margin-top: 4px;
    ">Reset to Auto</button>
  </div>
</body>
</html>
